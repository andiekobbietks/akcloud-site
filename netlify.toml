# ─── Build & deploy ───────────────────────────────────────────
# AKcloud is a pure static site — no build step required.
# Netlify will serve the repo root as-is.

[build]
  publish = "."
  # No build command needed. Uncomment when you add a static site generator:
  # command = "npm run build"

# ─── Redirects ─────────────────────────────────────────────────
# Pretty URLs and the admin route.

[[redirects]]
  from = "/admin"
  to   = "/admin.html"
  status = 200

# Force HTTPS (Netlify does this by default; this is belt-and-braces)
[[redirects]]
  from = "http://akcloud.netlify.app/*"
  to   = "https://akcloud.netlify.app/:splat"
  status = 301
  force = false

# API → Functions
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# ─── Headers (security + caching) ──────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options           = "DENY"
    X-Content-Type-Options    = "nosniff"
    Referrer-Policy           = "strict-origin-when-cross-origin"
    Permissions-Policy        = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/admin.html"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow"
    # When you turn on Visitor Access in the Netlify dashboard, this header
    # tells search engines to skip the page entirely.

# ─── Environment (set these in Netlify UI for prod) ────────────
# [context.production.environment]
#   RESEND_API_KEY = "re_xxx"
#   ODOO_URL       = "https://your-sovereign-odoo.example.com"
#   ODOO_DB        = "akcloud"
#   ODOO_USER      = "api@akcloud.example.com"
#   ODOO_API_KEY   = "xxx"
#   NOTIFY_EMAIL   = "you@akcloud.example.com"

# ─── Functions ─────────────────────────────────────────────────
[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"